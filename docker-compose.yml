# =============================================================================
# FlashAudit Docker Compose
# =============================================================================
#
# Usage:
#   docker-compose up -d              # Start all services
#   docker-compose up -d backend      # Start only the dashboard
#   docker-compose logs -f backend    # View backend logs
#
# Scanner usage (after building):
#   docker-compose run --rm scanner /repo
#   docker-compose run --rm scanner /repo --format sarif
#
# =============================================================================

services:
  # FlashAudit Scanner
  scanner:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - .:/repo:ro
    working_dir: /repo
    user: "1000:1000"

  # FlashAudit Backend / Dashboard
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite:///./data/flashaudit.db
      - ADMIN_KEY=${ADMIN_KEY:-please-change-this-key}
      - CORS_ORIGINS=*
      - ENABLE_DOCS=true
      - RATE_LIMIT_REQUESTS=100
      - RATE_LIMIT_WINDOW_SECONDS=60
    volumes:
      - flashaudit-data:/app/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  # Optional: PostgreSQL for production
  # Uncomment to use PostgreSQL instead of SQLite
  # postgres:
  #   image: postgres:16-alpine
  #   environment:
  #     - POSTGRES_USER=flashaudit
  #     - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-flashaudit}
  #     - POSTGRES_DB=flashaudit
  #   volumes:
  #     - postgres-data:/var/lib/postgresql/data
  #   healthcheck:
  #     test: ["CMD-SHELL", "pg_isready -U flashaudit"]
  #     interval: 10s
  #     timeout: 5s
  #     retries: 5

volumes:
  flashaudit-data:
  # postgres-data:
