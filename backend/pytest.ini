[pytest]
asyncio_mode = auto
# The test suite uses a single module-level async engine with a StaticPool
# (required for sqlite :memory:). aiosqlite binds that connection's background
# thread to the event loop it is first used on, so every test/fixture must share
# one loop — otherwise a later test awaits a future on an already-closed loop and
# deadlocks uninterruptibly. Pin all tests and fixtures to one session loop.
asyncio_default_test_loop_scope = session
asyncio_default_fixture_loop_scope = session
