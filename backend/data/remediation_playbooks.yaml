# =============================================================================
# FlashAudit Remediation Playbooks
#
# Maps each rule_id from rules.yaml to actionable rotation/revocation guidance.
# Loaded at startup by services/remediation.py via yaml.safe_load().
# =============================================================================

# =============================================================================
# Private Keys
# =============================================================================

RSA_PRIVATE_KEY:
  provider: "Generic / OpenSSL"
  blast_radius: "Full authentication to any system trusting this key. Can impersonate the key owner for SSH, TLS, code signing, or encrypted communications."
  steps:
    - "Identify all systems that trust this key (authorized_keys, TLS configs, certificate authorities)"
    - "Generate a new RSA key pair: ssh-keygen -t rsa -b 4096 or openssl genrsa -out new_key.pem 4096"
    - "Deploy the new public key to all trusting systems"
    - "Remove the old public key from all authorized_keys files and certificate stores"
    - "Revoke any certificates signed with the old key"
    - "Audit access logs for unauthorized usage during the exposure window"
  console_url: null
  estimated_minutes: 30
  auto_revocable: false
  vault_alternative: "Use HashiCorp Vault SSH Secrets Engine for short-lived SSH certificates instead of long-lived keys"
  references:
    - "https://www.ssh.com/academy/ssh/keygen"

OPENSSH_PRIVATE_KEY:
  provider: "OpenSSH"
  blast_radius: "SSH access to any server where the corresponding public key is in authorized_keys. Can execute commands, transfer files, and tunnel connections."
  steps:
    - "Identify all servers using this key (check ~/.ssh/authorized_keys on each host)"
    - "Generate a new key: ssh-keygen -t ed25519 -C 'your_email@example.com'"
    - "Deploy the new public key: ssh-copy-id -i ~/.ssh/new_key.pub user@host"
    - "Remove the old public key from authorized_keys on every server"
    - "Update any automated scripts or CI/CD pipelines using this key"
    - "Check SSH auth logs (/var/log/auth.log) for unauthorized access"
  console_url: null
  estimated_minutes: 20
  auto_revocable: false
  vault_alternative: "Use HashiCorp Vault SSH Secrets Engine or short-lived SSH certificates via a CA"
  references:
    - "https://www.ssh.com/academy/ssh/keygen"

EC_PRIVATE_KEY:
  provider: "Generic / OpenSSL"
  blast_radius: "ECDSA/ECDH authentication and signing. Can impersonate the key owner for TLS, SSH, JWT signing, or API authentication."
  steps:
    - "Identify all systems trusting this EC key"
    - "Generate a new EC key: openssl ecparam -genkey -name prime256v1 -out new_key.pem"
    - "Deploy the new public key and update certificates"
    - "Remove the old key from all trust stores"
    - "Revoke any certificates issued with the old key"
  console_url: null
  estimated_minutes: 30
  auto_revocable: false
  vault_alternative: "Use a secrets manager or certificate authority for short-lived certificates"
  references:
    - "https://wiki.openssl.org/index.php/Command_Line_Elliptic_Curve_Operations"

PGP_PRIVATE_KEY:
  provider: "GnuPG / OpenPGP"
  blast_radius: "Can decrypt all messages encrypted to this key, forge signatures as the key owner, and impersonate the identity on PGP keyservers."
  steps:
    - "Generate a revocation certificate: gpg --gen-revoke KEY_ID"
    - "Publish the revocation to keyservers: gpg --send-keys KEY_ID"
    - "Generate a new PGP key pair: gpg --full-generate-key"
    - "Update your public key on keyservers and notify contacts"
    - "Re-encrypt any sensitive data with the new key"
  console_url: null
  estimated_minutes: 20
  auto_revocable: false
  vault_alternative: "Use organizational key management with subkeys and expiry dates"
  references:
    - "https://www.gnupg.org/gph/en/manual/c14.html"

DSA_PRIVATE_KEY:
  provider: "Generic / OpenSSL"
  blast_radius: "DSA authentication to systems trusting this key. Note: DSA is deprecated in OpenSSH 7.0+ due to security concerns."
  steps:
    - "Identify all systems trusting this DSA key"
    - "Generate a replacement key using a modern algorithm: ssh-keygen -t ed25519"
    - "Deploy the new key and remove the old DSA key from all authorized_keys"
    - "Update SSH configurations to disable DSA if possible"
  console_url: null
  estimated_minutes: 20
  auto_revocable: false
  vault_alternative: "Migrate to Ed25519 keys managed through a secrets vault with automatic rotation"
  references:
    - "https://www.ssh.com/academy/ssh/keygen"

PUTTY_PRIVATE_KEY:
  provider: "PuTTY"
  blast_radius: "SSH access to servers configured with the corresponding public key. Commonly used on Windows systems for remote server management."
  steps:
    - "Open PuTTYgen and generate a new key pair"
    - "Save the new private key (.ppk) and deploy the public key to servers"
    - "Remove the old public key from authorized_keys on all servers"
    - "Update any PuTTY saved sessions to use the new key"
    - "Securely delete the old .ppk file"
  console_url: null
  estimated_minutes: 15
  auto_revocable: false
  vault_alternative: "Use OpenSSH keys with a secrets manager instead of PuTTY-format keys"
  references:
    - "https://www.chiark.greenend.org.uk/~sgtatham/putty/docs.html"

# =============================================================================
# AWS
# =============================================================================

AWS_ACCESS_KEY:
  provider: "Amazon Web Services"
  blast_radius: "Full AWS account access scoped to the IAM user's attached policies. Can provision resources, access S3 data, modify infrastructure, and incur charges."
  steps:
    - "Go to AWS IAM Console -> Users -> select the affected user"
    - "Click 'Security credentials' tab -> find the exposed Access Key ID"
    - "Click 'Deactivate' to immediately prevent usage, then 'Delete' the key"
    - "Create a new Access Key under the same user"
    - "Update the key in your application, CI/CD, or environment variables"
    - "Review CloudTrail logs for unauthorized API calls during the exposure window"
    - "Check for any resources created by unauthorized access (EC2 instances, S3 buckets, IAM users)"
  console_url: "https://console.aws.amazon.com/iam/home#/security_credentials"
  estimated_minutes: 10
  auto_revocable: false
  vault_alternative: "Use IAM Roles for EC2/Lambda instead of long-lived access keys. For external access, use AWS Secrets Manager with automatic rotation or temporary credentials via STS AssumeRole."
  references:
    - "https://docs.aws.amazon.com/IAM/latest/UserGuide/id_credentials_access-keys.html"
    - "https://docs.aws.amazon.com/IAM/latest/UserGuide/best-practices.html#rotate-credentials"

AWS_SECRET_KEY:
  provider: "Amazon Web Services"
  blast_radius: "Combined with an Access Key ID, grants full API access to AWS services scoped to the IAM user's policies. Can read/write S3, manage EC2, access databases, and incur costs."
  steps:
    - "Go to AWS IAM Console -> Users -> select the affected user"
    - "Click 'Security credentials' tab -> find the associated Access Key ID"
    - "Click 'Deactivate' then 'Delete' the key pair"
    - "Create a new Access Key pair and update your application"
    - "Review CloudTrail for any unauthorized usage"
    - "If unauthorized access found, follow AWS incident response guide"
  console_url: "https://console.aws.amazon.com/iam/home#/security_credentials"
  estimated_minutes: 10
  auto_revocable: false
  vault_alternative: "Use IAM Roles for compute workloads. For external systems, use AWS Secrets Manager with automatic rotation."
  references:
    - "https://docs.aws.amazon.com/IAM/latest/UserGuide/id_credentials_access-keys.html"

# =============================================================================
# GitHub
# =============================================================================

GITHUB_PAT:
  provider: "GitHub"
  blast_radius: "Access to all repositories and organizations the token owner can access. Depending on scopes: can read/write code, manage issues, create releases, modify org settings, and access private repos."
  steps:
    - "Go to GitHub Settings -> Developer settings -> Personal access tokens"
    - "Find the compromised token and click 'Delete'"
    - "Generate a new token with minimum required scopes"
    - "Update the token in your application or CI/CD environment"
    - "Review GitHub audit log for the account: Settings -> Security log"
    - "Check for any unauthorized commits, repo access, or settings changes"
  console_url: "https://github.com/settings/tokens"
  estimated_minutes: 5
  auto_revocable: true
  vault_alternative: "Use GitHub App installation tokens (short-lived, scoped to specific repos) or fine-grained personal access tokens with minimum permissions"
  references:
    - "https://docs.github.com/en/authentication/keeping-your-account-and-data-secure/managing-your-personal-access-tokens"

GITHUB_OAUTH:
  provider: "GitHub"
  blast_radius: "OAuth token grants access based on authorized scopes. Can access user profile, repos, and organizations as the authorizing user."
  steps:
    - "Go to GitHub Settings -> Applications -> Authorized OAuth Apps"
    - "Revoke the compromised application's access"
    - "If you control the OAuth App, regenerate the client secret in Developer settings"
    - "Review audit log for unauthorized actions during exposure"
  console_url: "https://github.com/settings/applications"
  estimated_minutes: 5
  auto_revocable: true
  vault_alternative: "Use GitHub App installation tokens with granular permissions instead of OAuth tokens"
  references:
    - "https://docs.github.com/en/apps/oauth-apps/maintaining-oauth-apps/troubleshooting-oauth-app-access-token-request-errors"

GITHUB_APP_TOKEN:
  provider: "GitHub"
  blast_radius: "GitHub user-to-server token. Grants access to resources on behalf of a user through a GitHub App installation."
  steps:
    - "Go to GitHub Settings -> Applications -> Installed GitHub Apps"
    - "Revoke or suspend the GitHub App installation"
    - "Contact the app developer if the token was leaked by a third-party app"
    - "Review audit log for actions taken with this token"
  console_url: "https://github.com/settings/installations"
  estimated_minutes: 5
  auto_revocable: true
  vault_alternative: "GitHub App tokens are already short-lived. Ensure your app refreshes tokens properly."
  references:
    - "https://docs.github.com/en/apps/creating-github-apps/authenticating-with-a-github-app/about-authentication-with-a-github-app"

GITHUB_SERVER_TOKEN:
  provider: "GitHub"
  blast_radius: "Server-to-server token for GitHub App installations. Grants access to repos and resources the App is installed on."
  steps:
    - "Go to GitHub organization settings -> Installed GitHub Apps"
    - "Suspend or uninstall the affected GitHub App"
    - "Regenerate the App's private key in Developer settings"
    - "Review organization audit log for unauthorized actions"
  console_url: "https://github.com/settings/apps"
  estimated_minutes: 5
  auto_revocable: true
  vault_alternative: "GitHub server tokens are already short-lived (1 hour). Ensure private keys are stored securely."
  references:
    - "https://docs.github.com/en/apps/creating-github-apps/authenticating-with-a-github-app/generating-an-installation-access-token-for-a-github-app"

GITHUB_REFRESH_TOKEN:
  provider: "GitHub"
  blast_radius: "Can generate new access tokens for a GitHub App, maintaining persistent access to the user's resources."
  steps:
    - "Go to GitHub Settings -> Applications -> Authorized GitHub Apps"
    - "Revoke the app's authorization to invalidate all tokens"
    - "Re-authorize the app to get fresh tokens"
    - "Review audit log for suspicious token usage"
  console_url: "https://github.com/settings/apps/authorizations"
  estimated_minutes: 5
  auto_revocable: true
  vault_alternative: "Ensure refresh tokens are stored encrypted and rotated on each use"
  references:
    - "https://docs.github.com/en/apps/creating-github-apps/authenticating-with-a-github-app/refreshing-user-access-tokens"

# =============================================================================
# GitLab
# =============================================================================

GITLAB_PAT:
  provider: "GitLab"
  blast_radius: "Access to all GitLab resources the token owner can reach. Depending on scopes: can read/write repos, manage CI/CD, access container registry, and modify project settings."
  steps:
    - "Go to GitLab -> User Settings -> Access Tokens"
    - "Find the compromised token and click 'Revoke'"
    - "Create a new token with minimum required scopes and an expiry date"
    - "Update the token in your application or CI/CD pipelines"
    - "Review GitLab audit events: Admin -> Monitoring -> Audit Events"
  console_url: "https://gitlab.com/-/user_settings/personal_access_tokens"
  estimated_minutes: 5
  auto_revocable: false
  vault_alternative: "Use GitLab CI/CD job tokens (short-lived, scoped to pipeline) or project/group access tokens with minimum scopes and expiry"
  references:
    - "https://docs.gitlab.com/ee/user/profile/personal_access_tokens.html"

GITLAB_RUNNER:
  provider: "GitLab"
  blast_radius: "Can register new CI/CD runners to your GitLab instance or group, potentially executing arbitrary code in your CI/CD environment."
  steps:
    - "Go to GitLab -> Admin Area -> CI/CD -> Runners (or project/group settings)"
    - "Reset the runner registration token"
    - "Remove any runners registered with the compromised token"
    - "Re-register legitimate runners with the new token"
    - "Review CI/CD pipeline logs for unauthorized job executions"
  console_url: "https://gitlab.com/admin/runners"
  estimated_minutes: 10
  auto_revocable: false
  vault_alternative: "Use the new GitLab runner authentication flow with short-lived tokens instead of registration tokens"
  references:
    - "https://docs.gitlab.com/runner/register/"

# =============================================================================
# Slack
# =============================================================================

SLACK_BOT_TOKEN:
  provider: "Slack"
  blast_radius: "Can post messages, read channels, access files, and interact with Slack APIs as the bot. Scope depends on the bot's OAuth permissions."
  steps:
    - "Go to api.slack.com -> Your Apps -> select the app"
    - "Click 'OAuth & Permissions' and rotate the Bot User OAuth Token"
    - "Update the token in your application"
    - "Review the app's access logs in Slack's analytics"
    - "Consider reducing the bot's OAuth scopes to minimum required"
  console_url: "https://api.slack.com/apps"
  estimated_minutes: 5
  auto_revocable: false
  vault_alternative: "Store Slack tokens in a secrets manager. Use socket mode for internal apps to avoid exposing webhook URLs."
  references:
    - "https://api.slack.com/authentication/token-types#bot"

SLACK_USER_TOKEN:
  provider: "Slack"
  blast_radius: "Can perform actions as the user: read/send messages in all accessible channels, access files, manage workspace settings depending on the user's role."
  steps:
    - "Go to api.slack.com -> Your Apps -> select the app"
    - "Click 'OAuth & Permissions' and rotate the User OAuth Token"
    - "Update the token in your application"
    - "Review workspace audit logs for unauthorized actions"
    - "Notify the affected user to review their Slack activity"
  console_url: "https://api.slack.com/apps"
  estimated_minutes: 5
  auto_revocable: false
  vault_alternative: "Use bot tokens with specific scopes instead of user tokens whenever possible"
  references:
    - "https://api.slack.com/authentication/token-types#user"

SLACK_WEBHOOK:
  provider: "Slack"
  blast_radius: "Can post messages to a specific Slack channel. Cannot read messages or access other channels, but can be used for phishing or spam."
  steps:
    - "Go to api.slack.com -> Your Apps -> select the app -> Incoming Webhooks"
    - "Delete the compromised webhook URL"
    - "Create a new webhook URL for the target channel"
    - "Update the URL in your application"
  console_url: "https://api.slack.com/apps"
  estimated_minutes: 5
  auto_revocable: false
  vault_alternative: "Use Slack's Workflow Builder for simple notifications, or bot tokens with chat:write scope for programmatic messaging"
  references:
    - "https://api.slack.com/messaging/webhooks"

# =============================================================================
# Google
# =============================================================================

GOOGLE_API_KEY:
  provider: "Google Cloud"
  blast_radius: "Access to Google APIs enabled for the project. Depending on API restrictions: can access Maps, YouTube, Translate, and other Google services. May incur significant charges."
  steps:
    - "Go to Google Cloud Console -> APIs & Services -> Credentials"
    - "Find the exposed API key and click the delete icon"
    - "Create a new API key with appropriate restrictions (HTTP referrers, IP addresses, API scopes)"
    - "Update the key in your application"
    - "Review billing for unexpected charges from API abuse"
    - "Enable API key restrictions to limit which APIs and origins can use the key"
  console_url: "https://console.cloud.google.com/apis/credentials"
  estimated_minutes: 5
  auto_revocable: false
  vault_alternative: "Use service accounts with IAM roles instead of API keys. Restrict API keys to specific referrers and APIs."
  references:
    - "https://cloud.google.com/docs/authentication/api-keys"

GOOGLE_OAUTH_CLIENT:
  provider: "Google Cloud"
  blast_radius: "OAuth Client ID alone has limited risk, but combined with the client secret, it can be used to initiate OAuth flows and potentially access user data."
  steps:
    - "Go to Google Cloud Console -> APIs & Services -> Credentials"
    - "Find the OAuth 2.0 Client ID and click to edit"
    - "Reset the client secret"
    - "Update the client secret in your application"
    - "Review the OAuth consent screen for any unauthorized changes"
  console_url: "https://console.cloud.google.com/apis/credentials"
  estimated_minutes: 10
  auto_revocable: false
  vault_alternative: "Store OAuth client secrets in a secrets manager. Use workload identity federation for server-to-server auth."
  references:
    - "https://cloud.google.com/docs/authentication"

# =============================================================================
# Stripe
# =============================================================================

STRIPE_LIVE_SECRET:
  provider: "Stripe"
  blast_radius: "CRITICAL: Full access to live payment processing. Can create charges, issue refunds, access customer payment data (cards, bank accounts), modify subscriptions, and transfer funds."
  steps:
    - "IMMEDIATELY go to Stripe Dashboard -> Developers -> API keys"
    - "Click 'Roll key' on the compromised live secret key"
    - "Update the new key in your application — the old key remains valid for 24 hours during transition"
    - "Review recent transactions for unauthorized charges or refunds"
    - "Check for unauthorized Connected accounts or transfers"
    - "Review Stripe event logs for suspicious API calls"
    - "Consider enabling Stripe Radar rules to block suspicious activity"
  console_url: "https://dashboard.stripe.com/apikeys"
  estimated_minutes: 10
  auto_revocable: false
  vault_alternative: "Use Stripe restricted keys with minimum permissions. Store keys in a secrets manager with automatic rotation."
  references:
    - "https://docs.stripe.com/keys#rolling-keys"
    - "https://docs.stripe.com/keys#limit-access"

STRIPE_TEST_SECRET:
  provider: "Stripe"
  blast_radius: "Low direct financial risk (test mode only), but exposes your Stripe account structure, test customer data, and integration details."
  steps:
    - "Go to Stripe Dashboard -> Developers -> API keys (toggle to Test mode)"
    - "Click 'Roll key' on the compromised test secret key"
    - "Update the new key in your development/staging environment"
  console_url: "https://dashboard.stripe.com/test/apikeys"
  estimated_minutes: 5
  auto_revocable: false
  vault_alternative: "Use restricted test keys. Never commit even test keys to version control."
  references:
    - "https://docs.stripe.com/keys"

STRIPE_LIVE_RESTRICTED:
  provider: "Stripe"
  blast_radius: "Access limited to the specific Stripe API resources the restricted key was configured for. Still dangerous if scoped to charges or customers."
  steps:
    - "Go to Stripe Dashboard -> Developers -> API keys -> Restricted keys"
    - "Delete the compromised restricted key"
    - "Create a new restricted key with the same permissions"
    - "Update the key in your application"
    - "Review API logs for unauthorized usage"
  console_url: "https://dashboard.stripe.com/apikeys"
  estimated_minutes: 5
  auto_revocable: false
  vault_alternative: "Store restricted keys in a secrets manager. Audit key permissions regularly to ensure minimum access."
  references:
    - "https://docs.stripe.com/keys#limit-access"

# =============================================================================
# Database URLs
# =============================================================================

POSTGRES_URI:
  provider: "PostgreSQL"
  blast_radius: "Full database access with the credentials in the connection string. Can read, modify, or delete all data. May allow executing system commands via extensions."
  steps:
    - "Connect to PostgreSQL as a superuser"
    - "Change the password: ALTER USER username WITH PASSWORD 'new_secure_password';"
    - "Update the connection string in your application and environment variables"
    - "Review pg_stat_activity for any active suspicious connections"
    - "Check pg_log for unauthorized queries during the exposure window"
    - "Consider restricting pg_hba.conf to allow connections only from known IPs"
  console_url: null
  estimated_minutes: 10
  auto_revocable: false
  vault_alternative: "Use HashiCorp Vault Database Secrets Engine for dynamic, short-lived database credentials"
  references:
    - "https://www.postgresql.org/docs/current/sql-alterrole.html"

MYSQL_URI:
  provider: "MySQL"
  blast_radius: "Full database access scoped to the user's grants. Can read, write, and delete data. With elevated privileges, can modify database structure or access other databases."
  steps:
    - "Connect to MySQL as root or admin"
    - "Change the password: ALTER USER 'username'@'host' IDENTIFIED BY 'new_secure_password';"
    - "Flush privileges: FLUSH PRIVILEGES;"
    - "Update the connection string in your application"
    - "Review the general query log for unauthorized access"
    - "Verify user grants are at minimum necessary level"
  console_url: null
  estimated_minutes: 10
  auto_revocable: false
  vault_alternative: "Use HashiCorp Vault Database Secrets Engine or AWS RDS IAM authentication for dynamic credentials"
  references:
    - "https://dev.mysql.com/doc/refman/8.0/en/alter-user.html"

MONGODB_URI:
  provider: "MongoDB"
  blast_radius: "Full access to the MongoDB database with the embedded credentials. Can read, write, and drop collections. If admin role, can modify users and database configuration."
  steps:
    - "Connect to MongoDB as admin"
    - "Change the password: db.changeUserPassword('username', 'new_secure_password')"
    - "Update the connection string in your application"
    - "Review MongoDB logs for unauthorized connections"
    - "Enable MongoDB audit logging if not already active"
    - "Verify that network access is restricted (IP whitelist for Atlas, firewall for self-hosted)"
  console_url: null
  estimated_minutes: 10
  auto_revocable: false
  vault_alternative: "Use HashiCorp Vault MongoDB plugin or MongoDB Atlas Database Access with temporary credentials"
  references:
    - "https://www.mongodb.com/docs/manual/tutorial/change-own-password-and-custom-data/"

REDIS_URI:
  provider: "Redis"
  blast_radius: "Full access to the Redis instance. Can read/write all keys, flush databases, and potentially execute Lua scripts. If used for sessions or caching, can hijack user sessions."
  steps:
    - "Connect to Redis and change the password: CONFIG SET requirepass 'new_secure_password'"
    - "Update redis.conf to persist the new password"
    - "Update the connection string in all applications"
    - "Review connected clients: CLIENT LIST"
    - "Check for unauthorized key modifications: MONITOR (briefly)"
    - "Restrict Redis to bind only to private network interfaces"
  console_url: null
  estimated_minutes: 10
  auto_revocable: false
  vault_alternative: "Use Redis ACLs with per-application users. Consider cloud-managed Redis with IAM-based auth."
  references:
    - "https://redis.io/docs/latest/operate/oss_and_stack/management/security/"

