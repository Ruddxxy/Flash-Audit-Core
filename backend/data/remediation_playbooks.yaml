# Supabase
# =============================================================================

SUPABASE_KEY:
  provider: "Supabase"
  blast_radius: "Service role key bypasses Row Level Security. Grants full read/write/delete access to all tables, storage, and auth APIs. CRITICAL for any Supabase project."
  steps:
    - "Go to Supabase Dashboard -> Project Settings -> API"
    - "Click 'Generate new keys' to rotate the service role key"
    - "Update the key in your server-side application (never expose in client code)"
    - "Review database logs for unauthorized queries"
    - "Verify Row Level Security is enabled on all tables"
    - "Ensure the anon key (not the service key) is used in client-side code"
  console_url: "https://supabase.com/dashboard/project/_/settings/api"
  estimated_minutes: 10
  auto_revocable: false
  vault_alternative: "Use the anon key for client-side. Use the service key only on trusted servers. Store in a secrets manager."
  references:
    - "https://supabase.com/docs/guides/api/api-keys"

# =============================================================================
# Doppler
# =============================================================================

DOPPLER_TOKEN:
  provider: "Doppler"
  blast_radius: "Personal token grants CLI access to all Doppler projects and environments the user can access. Can read all secrets managed by Doppler."
  steps:
    - "Go to Doppler Dashboard -> Access -> Tokens"
    - "Revoke the compromised personal token"
    - "Generate a new token: doppler login"
    - "Update any scripts using the old token"
    - "Review Doppler audit logs for unauthorized access"
  console_url: "https://dashboard.doppler.com/workplace/tokens"
  estimated_minutes: 5
  auto_revocable: false
  vault_alternative: "Use service tokens scoped to specific projects/environments instead of personal tokens"
  references:
    - "https://docs.doppler.com/docs/api#auth-token-types"

DOPPLER_SERVICE_TOKEN:
  provider: "Doppler"
  blast_radius: "Scoped to a specific Doppler project and environment. Can read all secrets in that config, which may include database passwords, API keys, and other credentials."
  steps:
    - "Go to Doppler Dashboard -> Project -> environment config -> Service Tokens"
    - "Revoke the compromised service token"
    - "Generate a new service token for the same config"
    - "Update the token in your application deployment"
    - "Consider rotating the secrets that were accessible via this token"
  console_url: "https://dashboard.doppler.com"
  estimated_minutes: 5
  auto_revocable: false
  vault_alternative: "Use short-lived service tokens. Enable Doppler's automatic token rotation if available."
  references:
    - "https://docs.doppler.com/docs/service-tokens"
