# Twilio
# =============================================================================

TWILIO_API_KEY:
  provider: "Twilio"
  blast_radius: "Can send SMS/MMS, make phone calls, access call recordings, and manage Twilio resources. Can incur significant charges through API abuse."
  steps:
    - "Go to Twilio Console -> Account -> API keys & tokens"
    - "Delete the compromised API key"
    - "Create a new API key"
    - "Update the key in your application"
    - "Review usage logs for unauthorized calls or messages"
    - "Check billing for unexpected charges"
  console_url: "https://www.twilio.com/console/project/api-keys"
  estimated_minutes: 5
  auto_revocable: false
  vault_alternative: "Use Twilio API keys (not Account SID/Auth Token) with limited permissions. Store in a secrets manager."
  references:
    - "https://www.twilio.com/docs/iam/api-keys"

TWILIO_AUTH_TOKEN:
  provider: "Twilio"
  blast_radius: "Master authentication for the Twilio account. Can access all APIs, send messages, make calls, access recordings, and manage all account resources."
  steps:
    - "Go to Twilio Console -> Account -> General Settings"
    - "Click 'Rotate Auth Token' — the old token remains valid for 24 hours"
    - "Update the auth token in all applications"
    - "After migration, click 'Delete old auth token'"
    - "Review account usage for unauthorized activity"
  console_url: "https://www.twilio.com/console"
  estimated_minutes: 10
  auto_revocable: false
  vault_alternative: "Use Twilio API Keys instead of the master Auth Token for application access"
  references:
    - "https://www.twilio.com/docs/iam/api/account"

# =============================================================================
# NPM / PyPI
# =============================================================================

NPM_TOKEN:
  provider: "npm"
  blast_radius: "Can publish packages to npm under your account, modify existing packages, and access private packages. Can be used for supply chain attacks."
  steps:
    - "Go to npmjs.com -> Account -> Access Tokens"
    - "Delete the compromised token"
    - "Create a new token with appropriate scope (publish or read-only)"
    - "Update the token in your CI/CD pipelines and .npmrc"
    - "Review recent package publish events: npm audit signatures"
    - "Check if any unauthorized versions were published to your packages"
  console_url: "https://www.npmjs.com/settings/~/tokens"
  estimated_minutes: 5
  auto_revocable: false
  vault_alternative: "Use granular access tokens with publish scope only for CI/CD. Enable npm 2FA for publishing."
