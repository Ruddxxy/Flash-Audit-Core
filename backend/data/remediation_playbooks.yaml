    - "Update the key in your application"
    - "Review email activity logs for unauthorized sends"
    - "Check suppression lists for any unauthorized modifications"
  console_url: "https://app.sendgrid.com/settings/api_keys"
  estimated_minutes: 5
  auto_revocable: false
  vault_alternative: "Use scoped API keys (Mail Send only) instead of full access keys. Store in a secrets manager."
  references:
    - "https://docs.sendgrid.com/ui/account-and-settings/api-keys"

